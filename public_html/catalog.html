    // --- SUB-COMPONENT: PRELOADER ---
    function Preloader() {
      const [progress, setProgress] = useState(0);
      const [fade, setFade] = useState(false);
      const [destroyed, setDestroyed] = useState(false);

      useEffect(() => {
        const timer = setInterval(() => {
          setProgress((old) => {
            if (old >= 100) {
              clearInterval(timer);
              return 100;
            }
            const step = Math.random() * 25 + 15;
            return Math.min(old + step, 100);
          });
        }, 120);

        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (progress === 100) {
          const fadeTimer = setTimeout(() => {
            setFade(true);
          }, 400);

          const destroyTimer = setTimeout(() => {
            setDestroyed(true);
          }, 900);

          return () => {
            clearTimeout(fadeTimer);
            clearTimeout(destroyTimer);
          };
        }
      }, [progress]);

      if (destroyed) return null;

      return (
        <div
          className={`fixed inset-0 bg-[#F8F9FA] z-[9999] flex flex-col items-center justify-center transition-opacity duration-500 ease-out select-none ${fade ? 'opacity-0 pointer-events-none' : 'opacity-100'

              <div

            </div>

            <span className="text-[10px] text-gray-400 font-bold mt-2">
